name: Amazon Monitor

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Amazon links
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          KEYWORD = "Amazon监控"
          WEBHOOK = os.environ["FEISHU_WEBHOOK"]

          with open("links.json", "r", encoding="utf-8") as f:
              links = json.load(f)["links"]

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120 Safari/537.36",
              "Accept-Language": "en-US,en;q=0.9"
          }

          normal = []
          abnormal = []

          for item in links:
              asin = item["asin"]
              url = item["url"]

              try:
                  req = urllib.request.Request(url, headers=headers)

                  with urllib.request.urlopen(req, timeout=25) as r:
                      html = r.read().decode("utf-8", errors="ignore")

                  # 页面异常
                  if (
                      "Robot Check" in html
                      or "Page Not Found" in html
                      or "Dogs of Amazon" in html
                  ):
                      abnormal.append(
                          f"⚠️ ASIN: {asin}\n"
                          f"异常：页面异常\n"
                          f"链接：{url}"
                      )
                  else:
                      normal.append(
                          f"✅ ASIN: {asin}\n"
                          f"状态：正常\n"
                          f"链接：{url}"
                      )

              except Exception as e:
                  abnormal.append(
                      f"⚠️ ASIN: {asin}\n"
                      f"异常：访问失败\n"
                      f"错误：{e}\n"
                      f"链接：{url}"
                  )

          text = (
              f"{KEYWORD}\n"
              f"本次检测结果：\n\n"
              f"正常：{len(normal)} 个\n"
              f"异常：{len(abnormal)} 个\n\n"
          )

          if normal:
              text += "【正常链接】\n"
              text += "\n\n".join(normal)
              text += "\n\n"

          if abnormal:
              text += "【异常链接】\n"
              text += "\n\n".join(abnormal)

          data = {
              "msg_type": "text",
              "content": {
                  "text": text
              }
          }

          req = urllib.request.Request(
              WEBHOOK,
              data=json.dumps(data).encode("utf-8"),
              headers={"Content-Type": "application/json"}
          )

          urllib.request.urlopen(req, timeout=20)

          PY
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
