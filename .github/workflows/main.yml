name: Amazon Monitor

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Amazon links
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.request

          KEYWORD = "Amazon监控"
          WEBHOOK = os.environ["FEISHU_WEBHOOK"]

          with open("links.json", "r", encoding="utf-8") as f:
              links = json.load(f)["links"]

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120 Safari/537.36",
              "Accept-Language": "en-US,en;q=0.9",
          }

          def clean_html(s):
              return re.sub(r"\s+", " ", s)

          def get_price(html):
              patterns = [
                  r'class="a-price-whole">([^<]+)</span><span class="a-price-decimal">[^<]*</span><span class="a-price-fraction">([^<]+)</span>',
                  r'id="priceblock_ourprice"[^>]*>([^<]+)<',
                  r'id="priceblock_dealprice"[^>]*>([^<]+)<',
                  r'id="corePriceDisplay_desktop_feature_div".{0,2000}?\$([0-9,]+(?:\.[0-9]{2})?)',
              ]
              for p in patterns:
                  m = re.search(p, html, re.S)
                  if m:
                      if len(m.groups()) == 2:
                          return "$" + m.group(1).replace(",", "").strip() + "." + m.group(2).strip()
                      return m.group(1).strip() if "$" in m.group(1) else "$" + m.group(1).strip()
              return "未检测到"

          def has_coupon(html):
              words = [
                  "coupon",
                  "Coupon",
                  "Apply",
                  "Save",
                  "with coupon",
                  "couponBadge",
              ]
              return any(w in html for w in words)

          def has_deal(html):
              words = [
                  "Limited time deal",
                  "Deal",
                  "Lightning Deal",
                  "Today's Deal",
                  "dealBadge",
                  "savingsPercentage",
              ]
              return any(w in html for w in words)

          ok = []
          bad = []

          for item in links:
              asin = item["asin"]
              url = item["url"]

              try:
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req, timeout=25) as r:
                      html = r.read().decode("utf-8", errors="ignore")

                  flat_html = clean_html(html)

                  price = get_price(flat_html)
                  coupon = "有" if has_coupon(flat_html) else "无/未检测到"
                  deal = "有" if has_deal(flat_html) else "无/未检测到"

                  has_cart = (
                      "add-to-cart-button" in html
                      or "Add to Cart" in html
                      or "Buy Now" in html
                      or "buy-now-button" in html
                  )

                  extra = f"价格：{price}\n秒杀/Deal：{deal}\nCoupon：{coupon}\n链接：{url}"

                  if "Robot Check" in html:
                      bad.append(f"❌ ASIN：{asin}\n异常：Amazon验证码/机器人拦截\n{extra}")

                  elif "Page Not Found" in html or "Dogs of Amazon" in html or "Sorry! We couldn't find that page" in html:
                      bad.append(f"❌ ASIN：{asin}\n异常：页面打不开/狗页/Listing异常\n{extra}")

                  elif not has_cart:
                      bad.append(f"⚠️ ASIN：{asin}\n异常：疑似购物车丢失，未检测到 Add to Cart / Buy Now\n{extra}")

                  else:
                      ok.append(f"✅ ASIN：{asin}\n状态：前台正常，检测到购物车/购买按钮\n{extra}")

              except Exception as e:
                  bad.append(f"❌ ASIN：{asin}\n异常：访问失败\n错误：{e}\n链接：{url}")

          text = KEYWORD + "\n本次检测结果：\n\n"
          text += f"正常：{len(ok)} 个\n"
          text += f"异常：{len(bad)} 个\n\n"

          if ok:
              text += "【正常链接】\n" + "\n\n".join(ok) + "\n\n"

          if bad:
              text += "【异常链接】\n" + "\n\n".join(bad)

          data = {
              "msg_type": "text",
              "content": {"text": text}
          }

          req = urllib.request.Request(
              WEBHOOK,
              data=json.dumps(data).encode("utf-8"),
              headers={"Content-Type": "application/json"}
          )

          urllib.request.urlopen(req, timeout=20)
          PY
