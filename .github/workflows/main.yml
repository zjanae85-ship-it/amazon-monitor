name: Amazon Monitor

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Amazon links
        run: |
          python - <<'PY'
          import json, os, urllib.request

          KEYWORD = "Amazon监控"
          WEBHOOK = os.environ["FEISHU_WEBHOOK"]

          with open("links.json", "r", encoding="utf-8") as f:
              links = json.load(f)["links"]

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120 Safari/537.36",
              "Accept-Language": "en-US,en;q=0.9",
          }

          bad = []

          for item in links:
              asin = item["asin"]
              url = item["url"]

              try:
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req, timeout=25) as r:
                      html = r.read().decode("utf-8", errors="ignore")

                  page_problem_words = [
                      "Sorry! We couldn",
                      "Page Not Found",
                      "Dogs of Amazon",
                      "Robot Check",
                  ]

                  unavailable_words = [
                      "Currently unavailable",
                      "This item is currently unavailable",
                      "Temporarily out of stock",
                  ]

                  cart_words = [
                      "Add to Cart",
                      "Buy Now",
                      "add-to-cart-button",
                      "buy-now-button",
                  ]

                  if any(w in html for w in page_problem_words):
                      bad.append(f"ASIN：{asin}\n异常：页面异常/狗页/验证码\n链接：{url}")

                  elif any(w in html for w in unavailable_words):
                      bad.append(f"ASIN：{asin}\n异常：前台不可售 / Currently unavailable\n链接：{url}")

                  elif not any(w in html for w in cart_words):
                      bad.append(f"ASIN：{asin}\n异常：疑似购物车丢失，未检测到 Add to Cart / Buy Now\n链接：{url}")

                  else:
                      print(f"{asin} 正常：检测到购物车/购买按钮")

              except Exception as e:
                  bad.append(f"ASIN：{asin}\n异常：访问失败\n错误：{e}\n链接：{url}")

          if bad:
              text = KEYWORD + "\n发现异常：\n\n" + "\n\n".join(bad)
              data = {
                  "msg_type": "text",
                  "content": {
                      "text": text
                  }
              }

              req = urllib.request.Request(
                  WEBHOOK,
                  data=json.dumps(data).encode("utf-8"),
                  headers={"Content-Type": "application/json"}
              )
              urllib.request.urlopen(req, timeout=20)
          else:
              print("全部链接正常，本次不发送飞书通知。")
          PY
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
