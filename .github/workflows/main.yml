name: Amazon Monitor

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Amazon links
        run: |
          python - <<'PY'
          import json, os, urllib.request

          KEYWORD = "Amazon监控"
          WEBHOOK = os.environ["FEISHU_WEBHOOK"]

          with open("links.json", "r", encoding="utf-8") as f:
              links = json.load(f)["links"]

          headers = {
              "User-Agent": "Mozilla/5.0"
          }

          bad = []

          for item in links:
              asin = item["asin"]
              url = item["url"]
              try:
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req, timeout=20) as r:
                      html = r.read().decode("utf-8", errors="ignore")

                  if "Currently unavailable" in html or "Sorry" in html or "Page Not Found" in html:
                      bad.append(f"{asin}\n{url}")
              except Exception as e:
                  bad.append(f"{asin}\n{url}\n错误：{e}")

          if bad:
              text = KEYWORD + "\n发现异常链接：\n\n" + "\n\n".join(bad)
              data = {
                  "msg_type": "text",
                  "content": {
                      "text": text
                  }
              }
              req = urllib.request.Request(
                  WEBHOOK,
                  data=json.dumps(data).encode("utf-8"),
                  headers={"Content-Type": "application/json"}
              )
              urllib.request.urlopen(req, timeout=20)
          PY
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
