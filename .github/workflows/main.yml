name: Amazon Monitor

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Amazon links
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          from datetime import datetime, timedelta, timezone

          KEYWORD = "Amazon监控"
          WEBHOOK = os.environ["FEISHU_WEBHOOK"]

          now_bj = datetime.now(timezone.utc) + timedelta(hours=8)
          hour = now_bj.hour
          weekday = now_bj.weekday()  # 0=周一，6=周日

          is_manual = os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch"
          is_weekend = weekday >= 5

          weekday_report_hours = [0, 9, 14, 17, 19, 22]
          weekend_report_hours = [0, 11, 18, 22]

          should_send_normal = (
              is_manual
              or (not is_weekend and hour in weekday_report_hours)
              or (is_weekend and hour in weekend_report_hours)
          )

          with open("links.json", "r", encoding="utf-8") as f:
              links = json.load(f)["links"]

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120 Safari/537.36",
              "Accept-Language": "en-US,en;q=0.9",
          }

          ok = []
          bad = []

          for item in links:
              asin = item["asin"]
              url = item["url"]

              try:
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req, timeout=25) as r:
                      html = r.read().decode("utf-8", errors="ignore")

                  if "Robot Check" in html:
                      bad.append(f"❌ ASIN：{asin}\n异常：Amazon验证码拦截\n链接：{url}")
                  elif "Page Not Found" in html or "Dogs of Amazon" in html or "Sorry! We couldn't find that page" in html:
                      bad.append(f"❌ ASIN：{asin}\n异常：页面异常/狗页\n链接：{url}")
                  else:
                      ok.append(f"✅ ASIN：{asin}\n状态：页面正常\n链接：{url}")

              except Exception as e:
                  bad.append(f"❌ ASIN：{asin}\n异常：访问失败\n错误：{e}\n链接：{url}")

          if bad or should_send_normal:
              if is_manual:
                  mode = "手动测试"
              elif bad:
                  mode = "异常立即通知"
              else:
                  mode = "固定时间报告"

              text = KEYWORD + "\n本次检测结果：\n\n"
              text += f"模式：{mode}\n"
              text += f"北京时间：{now_bj.strftime('%Y-%m-%d %H:%M')}\n"
              text += f"正常：{len(ok)} 个\n"
              text += f"异常：{len(bad)} 个\n\n"

              if ok:
                  text += "【正常链接】\n" + "\n\n".join(ok) + "\n\n"

              if bad:
                  text += "【异常链接】\n" + "\n\n".join(bad)

              data = {
                  "msg_type": "text",
                  "content": {"text": text}
              }

              req = urllib.request.Request(
                  WEBHOOK,
                  data=json.dumps(data).encode("utf-8"),
                  headers={"Content-Type": "application/json"}
              )

              urllib.request.urlopen(req, timeout=20)
          else:
              print("正常，但当前不是固定报告时间，不发送飞书。")
          PY
