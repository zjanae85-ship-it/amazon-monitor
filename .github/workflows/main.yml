name: Amazon Monitor

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Amazon links
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.request

          KEYWORD = "Amazon监控"
          WEBHOOK = os.environ["FEISHU_WEBHOOK"]

          with open("links.json", "r", encoding="utf-8") as f:
              links = json.load(f)["links"]

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120 Safari/537.36",
              "Accept-Language": "en-US,en;q=0.9",
          }

          ok = []
          bad = []

          def get_price(html):
              patterns = [
                  r'\$([0-9]+\.[0-9]{2})'
              ]

              for p in patterns:
                  m = re.search(p, html)
                  if m:
                      return "$" + m.group(1)

              return "未检测到"

          for item in links:
              asin = item["asin"]
              url = item["url"]

              try:
                  req = urllib.request.Request(url, headers=headers)

                  with urllib.request.urlopen(req, timeout=25) as r:
                      html = r.read().decode("utf-8", errors="ignore")

                  price = get_price(html)

                  coupon = "有" if "coupon" in html.lower() else "无/未检测到"

                  deal_keywords = [
                      "limited time deal",
                      "lightning deal",
                      "today's deal"
                  ]

                  deal = (
                      "有"
                      if any(k in html.lower() for k in deal_keywords)
                      else "无/未检测到"
                  )

                  extra = (
                      f"价格：{price}\n"
                      f"秒杀/Deal：{deal}\n"
                      f"Coupon：{coupon}\n"
                      f"链接：{url}"
                  )

                  if "Robot Check" in html:
                      bad.append(
                          f"❌ ASIN：{asin}\n"
                          f"异常：Amazon验证码拦截\n"
                          f"{extra}"
                      )

                  elif (
                      "Page Not Found" in html
                      or "Dogs of Amazon" in html
                      or "Sorry! We couldn't find that page" in html
                  ):
                      bad.append(
                          f"❌ ASIN：{asin}\n"
                          f"异常：页面异常/狗页\n"
                          f"{extra}"
                      )

                  elif "Loona Petbot" not in html:
                      bad.append(
                          f"⚠️ ASIN：{asin}\n"
                          f"异常：未检测到卖家 Loona Petbot（可能Buy Box丢失或页面结构变化）\n"
                          f"{extra}"
                      )

                  else:
                      ok.append(
                          f"✅ ASIN：{asin}\n"
                          f"状态：正常\n"
                          f"卖家：Loona Petbot\n"
                          f"{extra}"
                      )

              except Exception as e:
                  bad.append(
                      f"❌ ASIN：{asin}\n"
                      f"异常：访问失败\n"
                      f"错误：{e}\n"
                      f"链接：{url}"
                  )

          text = KEYWORD + "\n本次检测结果：\n\n"

          text += f"正常：{len(ok)} 个\n"
          text += f"异常：{len(bad)} 个\n\n"

          if ok:
              text += "【正常链接】\n"
              text += "\n\n".join(ok)
              text += "\n\n"

          if bad:
              text += "【异常链接】\n"
              text += "\n\n".join(bad)

          data = {
              "msg_type": "text",
              "content": {
                  "text": text
              }
          }

          req = urllib.request.Request(
              WEBHOOK,
              data=json.dumps(data).encode("utf-8"),
              headers={"Content-Type": "application/json"}
          )

          urllib.request.urlopen(req, timeout=20)

          PY
